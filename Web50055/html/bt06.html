<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài tập 6</title>
</head>
<body>
    <h4 style="text-align: center;">Audio Player</h4>
    <div style="display: flex; justify-content: center; align-items: center;"></div>
        <audio controls>
            <source src="../audio/audio.m4a" type="audio/mp4">
        </audio>
    </div>
    
    <h4 style="text-align: center;">Video Player</h4>
    <div style="display: flex; justify-content: center; align-items: center;">
        <video src="../videos/video.mp4" controls width="600"></video>
    </div>

    <h4 style="text-align: center;">YouTube Player</h4>
    <div style="display: flex; justify-content: center;">
        <iframe width="560" height="315" style="align-items: center;" src="https://www.youtube.com/embed/dg4Byky2oLk?si=9QbLKUG1HxUvjKUo" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
</body>
</html>
