    <title>Bài tập 4</title>
    <style>
        table {
            width: 80%;
            margin: auto;
            border: 1px solid;
            text-align: center;
            border-spacing: 3px;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
        }

        th {
            background-color:silver;
        }

        td:first-child {
            
            text-align: left;
        }

        .dat {
            background-color: yellow;
        }

        .khongdat {
            background-color: red;
            color: white;
        }
    </style>
</head>

<body>

    <table>
        <caption><h1>KẾT QUẢ HỌC TẬP</h1></caption>
        <thread>
            <tr>
                <th rowspan="2">Họ tên</th>
                <th colspan="3">Môn học</th>
                <th rowspan="2">Kết quả</th>
            </tr>

            <tr>
                <th>Toán</th>
                <th>Văn</th>
                <th>Ngoại ngữ</th>
            </tr>
        </thread>
        
        <tbody>
            <tr>
                <td>Trần Văn Thành</td>
                <td>8</td>
                <td>5</td>
                <td>7</td>
                <td class="dat">Đạt</td>
            </tr>

            <tr>
                <td>Lê Thanh Sơn</td>
                <td>4</td>
                <td>9</td>
                <td>6</td>
                <td class="khongdat">Không đạt</td>
            </tr>

            <tr>
                <td>Nguyễn Thị Tuyết</td>
                <td>8</td>
                <td>9</td>
                <td>5</td>
                <td class="dat">Đạt</td>
            </tr>

            <tr>
                <td colspan="4">Tổng số học sinh đạt</td>
                <td>2</td>
            </tr>
        </tbody>
        
    </table>
