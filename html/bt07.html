    <body align="center">
        <div>
            <h2>Bài 1: Vẽ các hình cơ bản</h2>
            <svg width="280" height="170" viewBox="0 0 280 170">
                <rect x="10" y="10" width="260" height="120" fill="steelblue"/>

                <circle cx="140" cy="70" r="45" fill="tomato"/>

                <line x1="10" y1="10"
                        x2="270" y2="130"
                        stroke="yellow"
                        stroke-width="4"/>
            </svg>
        </div>

        <div>
            <h2>Bài 2: Vẽ ngôi nhà đơn giản</h2>
            <svg width="280" height="230" viewBox="0 0 280 230">
                <polygon points="140,45 60,110 220,110" fill="#d46d1a"/>

                <rect x="80" y="110" width="120" height="90" fill="#8b4513"/>

                <rect x="98" y="138" width="36" height="36" fill="#a9d2e8" stroke="black" stroke-width="2"/>

                <rect x="162" y="156" width="28" height="44" fill="#7a4a1a"/>

            </svg>
        </div>
